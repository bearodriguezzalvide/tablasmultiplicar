<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tablas Mágicas</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Tablas Mágicas">
    <link rel="apple-touch-icon" href="unicornio1.jpg">
    <meta name="theme-color" content="#6b2fa0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            background: linear-gradient(135deg, #ffd6e7 0%, #c8b6e2 50%, #a8d8ea 100%);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ---- SCREENS ---- */
        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            gap: 10px;
        }
        .screen.active { display: flex; }

        /* ---- TITLE ---- */
        .title {
            font-size: clamp(1.8em, 5vw, 3em);
            color: #6b2fa0;
            text-shadow: 3px 3px 0 #ffb3d9, 5px 5px 0 rgba(107,47,160,0.2);
            text-align: center;
            line-height: 1.2;
        }

        /* ---- MAIN BUTTON ---- */
        .btn-main {
            background: linear-gradient(135deg, #ff6eb4, #a855f7);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: clamp(1.1em, 3vw, 1.7em);
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(168,85,247,0.4);
            transition: transform 0.15s;
        }
        .btn-main:active { transform: scale(0.97); }

        /* ---- CONFIG CARD ---- */
        .config-card {
            background: rgba(255,255,255,0.72);
            border-radius: 20px;
            padding: 14px 18px;
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(107,47,160,0.12);
        }
        .cfg-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .cfg-label {
            font-size: clamp(0.85em, 2vw, 1em);
            color: #6b2fa0;
            white-space: nowrap;
        }
        .cfg-input {
            border: 2px solid #c8b6e2;
            border-radius: 12px;
            padding: 6px 10px;
            font-size: clamp(0.9em, 2vw, 1.05em);
            font-family: inherit;
            color: #6b2fa0;
            background: white;
            width: 130px;
            text-align: center;
            outline: none;
        }
        .cfg-input:focus { border-color: #a855f7; }
        .theme-btn {
            background: white;
            border: 3px solid #c8b6e2;
            border-radius: 14px;
            padding: 7px 16px;
            font-size: clamp(1em, 2.5vw, 1.2em);
            cursor: pointer;
            font-family: inherit;
            color: #6b2fa0;
            transition: all 0.2s;
        }
        .theme-btn.active {
            background: linear-gradient(135deg, #ff6eb4, #a855f7);
            color: white;
            border-color: #a855f7;
        }
        .counter { display: flex; align-items: center; gap: 6px; }
        .counter span {
            font-size: clamp(1em, 2.5vw, 1.2em);
            color: #6b2fa0;
            font-weight: bold;
            min-width: 38px;
            text-align: center;
        }
        .cnt-btn {
            background: white;
            border: 3px solid #c8b6e2;
            border-radius: 50%;
            width: 34px; height: 34px;
            font-size: 1.2em;
            cursor: pointer;
            font-family: inherit;
            color: #6b2fa0;
            font-weight: bold;
            transition: transform 0.12s;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
        }
        .cnt-btn:active { transform: scale(0.9); }
        .tabla-btn {
            background: white;
            border: 3px solid #c8b6e2;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 0.95em;
            cursor: pointer;
            font-family: inherit;
            color: #6b2fa0;
            font-weight: bold;
            transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
        }
        .tabla-btn.active {
            background: linear-gradient(135deg, #ff6eb4, #a855f7);
            color: white;
            border-color: #a855f7;
        }
        .tabla-btn:active { transform: scale(0.9); }

        /* ---- SCORE BAR ---- */
        .score-display {
            font-size: clamp(0.85em, 2.2vw, 1.1em);
            color: #6b2fa0;
            background: rgba(255,255,255,0.65);
            padding: 7px 18px;
            border-radius: 30px;
            text-align: center;
            flex: 1;
        }
        .timer-secs {
            font-size: clamp(0.85em, 2vw, 1.05em);
            color: #7e22ce;
            font-weight: bold;
            white-space: nowrap;
        }

        /* ---- UNICORN PROGRESS BAR ---- */
        .unicorn-bar {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 520px;
        }
        .uni-icon {
            font-size: clamp(0.9em, 2vw, 1.3em);
            filter: grayscale(100%) opacity(0.35);
            transition: filter 0.3s, transform 0.3s;
        }
        .uni-icon.rescued {
            filter: none;
            animation: pop 0.5s ease;
        }
        @keyframes pop {
            0%   { transform: scale(0) rotate(-10deg); }
            70%  { transform: scale(1.4) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* ---- TIMER BAR ---- */
        .timer-bar-wrap {
            width: 100%;
            max-width: 420px;
            height: 13px;
            background: rgba(255,255,255,0.35);
            border-radius: 10px;
            overflow: hidden;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #a855f7, #ff69b4);
        }

        /* ---- CAGE ---- */
        .cage-container {
            position: relative;
            width: clamp(120px, 18vh, 155px);
            height: clamp(138px, 21vh, 178px);
            flex-shrink: 0;
        }
        .unicorn-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            transition: filter 0.35s ease;
        }
        .cage-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transition: opacity 0.55s ease;
            pointer-events: none;
        }

        /* ---- QUESTION ---- */
        .question-box {
            background: rgba(255,255,255,0.72);
            border-radius: 28px;
            padding: 12px 32px;
            text-align: center;
            box-shadow: 0 6px 22px rgba(107,47,160,0.15);
        }
        .question-label {
            font-size: clamp(0.8em, 2vw, 1em);
            color: #9b59b6;
            margin-bottom: 2px;
        }
        .question-text {
            font-size: clamp(2em, 7vw, 3.5em);
            color: #6b2fa0;
            font-weight: bold;
        }

        /* ---- ANSWER BUTTONS ---- */
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 420px;
        }
        .btn-answer {
            background: white;
            border: 4px solid #c8b6e2;
            border-radius: 20px;
            padding: 16px 10px;
            font-size: clamp(1.4em, 5vw, 2em);
            font-family: inherit;
            color: #6b2fa0;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(107,47,160,0.12);
            transition: transform 0.15s, background 0.2s, border-color 0.2s;
        }
        .btn-answer:active   { transform: scale(0.96); }
        .btn-answer:disabled { cursor: default; }
        .btn-answer.correct  { background: #d4f7d4; border-color: #4caf50; color: #2e7d32; }
        .btn-answer.wrong    { background: #ffd4d4; border-color: #f44336; color: #c62828; }

        /* ---- FEEDBACK ---- */
        .feedback {
            font-size: clamp(1em, 3vw, 1.4em);
            min-height: 34px;
            text-align: center;
            font-weight: bold;
        }

        /* ---- END SCREEN ---- */
        .final-icons {
            font-size: clamp(1.6em, 4.5vw, 2.8em);
            letter-spacing: 3px;
            text-align: center;
            word-break: break-all;
            max-width: 90vw;
        }
        .final-score {
            font-size: clamp(1.1em, 3.5vw, 1.7em);
            color: #6b2fa0;
            background: rgba(255,255,255,0.7);
            padding: 12px 26px;
            border-radius: 20px;
            text-align: center;
        }
        .final-msg {
            font-size: clamp(0.95em, 2.5vw, 1.25em);
            color: #6b2fa0;
            text-align: center;
            max-width: 420px;
        }

        /* ---- FLOATING STARS ---- */
        .star {
            position: fixed;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
            8%   { opacity: 0.7; }
            92%  { opacity: 0.7; }
            100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
        }

        /* ---- SPARKLE BURST ---- */
        .sparkle-wrap { position: fixed; pointer-events: none; z-index: 999; }
        .sparkle {
            position: absolute;
            animation: burst 0.85s ease-out forwards;
        }
        @keyframes burst {
            0%   { transform: translate(0,0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="stars-bg"></div>

<!-- ========== CONFIG SCREEN ========== -->
<div id="config-screen" class="screen active">
    <div style="font-size:clamp(2em,6vw,4em);" id="start-emoji">🦄✨🦄</div>
    <div class="title" id="start-title">Tablas de<br>Multiplicar</div>

    <div class="config-card">
        <div class="cfg-row">
            <span class="cfg-label">👤 Jugadora:</span>
            <input type="text" id="cfg-name" value="Lola" class="cfg-input">
            <span class="cfg-label">🎮 Tema:</span>
            <button id="btn-uni"  class="theme-btn active" onclick="setTheme('unicornio')">🦄 Unicornios</button>
            <button id="btn-poke" class="theme-btn"        onclick="setTheme('pokemon')" ><img src="pokemonimg/pokeball.png" style="width:1.1em;height:1.1em;object-fit:contain;vertical-align:middle;"> Pokémon</button>
        </div>
        <div class="cfg-row" style="flex-wrap:wrap; gap:6px;">
            <span class="cfg-label">✖️ Tablas:</span>
            <div id="tablas-btns" style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;">
                <button class="tabla-btn" onclick="toggleTabla(1)">1</button>
                <button class="tabla-btn active" onclick="toggleTabla(2)">2</button>
                <button class="tabla-btn active" onclick="toggleTabla(3)">3</button>
                <button class="tabla-btn" onclick="toggleTabla(4)">4</button>
                <button class="tabla-btn active" onclick="toggleTabla(5)">5</button>
                <button class="tabla-btn" onclick="toggleTabla(6)">6</button>
                <button class="tabla-btn" onclick="toggleTabla(7)">7</button>
                <button class="tabla-btn" onclick="toggleTabla(8)">8</button>
                <button class="tabla-btn" onclick="toggleTabla(9)">9</button>
                <button class="tabla-btn active" onclick="toggleTabla(10)">10</button>
            </div>
        </div>
        <div class="cfg-row">
            <span class="cfg-label">📝 Operaciones:</span>
            <div class="counter">
                <button class="cnt-btn" onclick="changeQ(-5)">−</button>
                <span id="cfg-q">20</span>
                <button class="cnt-btn" onclick="changeQ(5)">+</button>
            </div>
            <span class="cfg-label">⏱️ Seg/op:</span>
            <div class="counter">
                <button class="cnt-btn" onclick="changeSecs(-1)">−</button>
                <span id="cfg-secs">4</span>
                <button class="cnt-btn" onclick="changeSecs(1)">+</button>
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="showPortada()">¡Siguiente! →</button>
</div>

<!-- ========== START SCREEN (portada) ========== -->
<div id="start-screen" class="screen">
    <div style="font-size:clamp(2em,6vw,4em);">🦄✨🦄</div>
    <div class="title">Tablas de<br>Multiplicar</div>

    <div style="font-size:clamp(0.95em,2.2vw,1.15em); color:#7e22ce; background:rgba(255,255,255,0.65); padding:9px 22px; border-radius:18px; text-align:center;">
        <span id="portada-name">Lola</span>, la seño <strong>María Jesús</strong> te manda una misión! 💜<br>
        <span style="font-size:0.9em; color:#e056a0;" id="start-mission">¡Rescata a todos los unicornios respondiendo bien!</span>
    </div>

    <img id="start-pokemon-emoji" src="pokemonimg/pokeball.png" style="display:none; width:clamp(70px,12vh,110px); height:clamp(70px,12vh,110px); object-fit:contain;" alt="pokeball">

    <button class="btn-main" onclick="startGame()">✨ ¡Empezar la misión! ✨</button>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="game-screen" class="screen">

    <div class="unicorn-bar" id="unicorn-bar"></div>

    <div style="display:flex; align-items:center; gap:10px; width:100%; max-width:420px;">
        <div class="score-display">
            <span id="theme-icon">🦄</span>
            <span id="score">0</span>
            <span id="action-word">rescatados</span>
            &nbsp;·&nbsp;P.<span id="q-num">1</span>/<span id="q-total">20</span>
        </div>
        <div class="timer-secs">⏱️ <span id="timer-secs">80</span>s</div>
    </div>

    <div class="timer-bar-wrap"><div id="timer-bar"></div></div>

    <div class="cage-container">
        <img id="unicorn-img" src="unicornio1.jpg" class="unicorn-img" alt="unicornio">
        <img id="pokemon-img" src="pokemonimg/pokemon1.png" class="unicorn-img" alt="pokemon" style="display:none;">
        <svg id="cage-svg" class="cage-overlay" viewBox="0 0 160 185"></svg>
        <img id="pokeball-img" src="pokemonimg/pokeball.png" class="cage-overlay" style="display:none; object-fit:contain; background:linear-gradient(135deg, #fff9c4 0%, #ffcc80 50%, #ffab91 100%);" alt="pokeball">
    </div>

    <div class="question-box">
        <div class="question-label">¿Cuánto es...?</div>
        <div class="question-text" id="question-text">2 × 3 = ?</div>
    </div>

    <div class="answers-grid" id="answers-grid">
        <button class="btn-answer" onclick="checkAnswer(this)">0</button>
        <button class="btn-answer" onclick="checkAnswer(this)">0</button>
        <button class="btn-answer" onclick="checkAnswer(this)">0</button>
        <button class="btn-answer" onclick="checkAnswer(this)">0</button>
    </div>

    <div class="feedback" id="feedback"></div>
</div>

<!-- ========== END SCREEN ========== -->
<div id="end-screen" class="screen">
    <div class="title" id="end-title">¡Misión completada! 🎉</div>
    <div class="final-icons" id="final-icons"></div>
    <div class="final-score"  id="final-score"></div>
    <div class="final-msg"    id="final-msg"></div>
    <button class="btn-main"  id="replay-btn" onclick="showScreen('config-screen')">🦄 ¡Jugar de nuevo!</button>
</div>

<script>
// ======================================================
// THEME DATA
// ======================================================
const THEMES = {
    unicornio: {
        bg:       'linear-gradient(135deg, #ffd6e7 0%, #c8b6e2 50%, #a8d8ea 100%)',
        icon:     '🦄',
        action:   'rescatados',
        title:    'Tablas de<br>Multiplicar',
        mission:  '¡Rescata a todos los unicornios respondiendo bien!',
        startEmoji: '🦄✨🦄',
        endTitle: '¡Misión completada! 🎉',
        cheers:   ['✨ ¡Bravo!','🌟 ¡Fantástico!','💫 ¡Increíble!','🎉 ¡Perfecto!','🦄 ¡Genial!','💜 ¡Súper!','⭐ ¡Lo sabías!','🌈 ¡Qué lista!','✨ ¡Asombroso!','💖 ¡Maravilloso!'],
        wrongMsg: (ans) => `💜 ¡Casi! Era el ${ans}`,
        timeMsg:  '⏰ ¡Se acabó el tiempo!',
        replayBtn:'🦄 ¡Jugar de nuevo!',
        cageHTML: `
            <rect x="4" y="4" width="152" height="174" rx="10" stroke="#8b6914" stroke-width="3.5" fill="rgba(139,105,20,0.07)"/>
            <line x1="30"  y1="4"  x2="30"  y2="178" stroke="#8b6914" stroke-width="3"/>
            <line x1="56"  y1="4"  x2="56"  y2="178" stroke="#8b6914" stroke-width="3"/>
            <line x1="82"  y1="4"  x2="82"  y2="178" stroke="#8b6914" stroke-width="3"/>
            <line x1="108" y1="4"  x2="108" y2="178" stroke="#8b6914" stroke-width="3"/>
            <line x1="134" y1="4"  x2="134" y2="178" stroke="#8b6914" stroke-width="3"/>
            <line x1="4"   y1="45" x2="156" y2="45"  stroke="#8b6914" stroke-width="2.5"/>
            <rect x="66" y="171" width="28" height="14" rx="4" fill="#8b6914"/>
            <path d="M72,171 Q80,159 88,171" stroke="#8b6914" stroke-width="3" fill="none"/>`,
    },
    pokemon: {
        bg:       'linear-gradient(135deg, #fff9c4 0%, #ffcc80 50%, #ffab91 100%)',
        icon:     '⚪',
        iconImg:  'pokemonimg/pokeball.png',
        action:   'capturados',
        title:    'Tablas de<br>Multiplicar',
        mission:  '¡Captura Pokémon respondiendo las operaciones!',
        endTitle: '¡Pokémon atrapados! 🎉',
        cheers:   ['⚡ ¡Atrapado!','🔥 ¡Capturado!','💫 ¡Pillado!','🎯 ¡Perfecto!','🌟 ¡Genial!','🌟 ¡Campeona!','✨ ¡Maestra!','💥 ¡Increíble!','🏆 ¡Gran captura!','⚡ ¡Pokémaestra!'],
        wrongMsg: (ans) => `😤 ¡Escapó! Era el ${ans}`,
        timeMsg:  '⏰ ¡Se acabó el tiempo!',
        replayBtn:'🎮 ¡Jugar de nuevo!',
    }
};


// ---- EDITA AQUÍ: imágenes de unicornios ----
// ---- EDITA AQUÍ: imágenes de unicornios ----
const UNICORN_IMAGES = [
    'unicornio1.jpg',
    'unicornio2.jpg',
    'unicornio3.jpg',
    'unicornio4.jpg',
    'unicornio5.jpg',
    'unicornio6.jpg',
    'unicornio7.jpg',
    'unicornio8.jpg',
    'unicornio9.jpg',
    'unicornio10.jpg',
];

const POKEMON_IMAGES = [
    'pokemonimg/pokemon1.png',
    'pokemonimg/pokemon2.png',
    'pokemonimg/pokemon3.png',
    'pokemonimg/pokemon4.png',
    'pokemonimg/pokemon5.png',
    'pokemonimg/pokemon6.png',
    'pokemonimg/pokemon7.png',
    'pokemonimg/pokemon8.png',
    'pokemonimg/pokemon9.png',
    'pokemonimg/pokemon10.png',
];

function themeIcon(th, size) {
    size = size || '1em';
    return th.iconImg
        ? `<img src="${th.iconImg}" style="width:${size};height:${size};object-fit:contain;vertical-align:middle;" alt="">`
        : th.icon;
}

// ======================================================
// GAME STATE + CONFIG
// ======================================================
const config = { theme: 'unicornio', totalQ: 20, secsPerQ: 4, tablas: [2, 3, 5, 10] };
let questions = [], currentQ = 0, score = 0, canAnswer = true;
let globalTimerInterval = null, globalTimeLeft = 0;

// ======================================================
// FLOATING STARS
// ======================================================
(function() {
    const cont = document.getElementById('stars-bg');
    const emojis = ['⭐','✨','💫','🌟','💜','💖'];
    for (let i = 0; i < 18; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.fontSize = (0.7 + Math.random() * 1.4) + 'em';
        s.style.animationDuration = (6 + Math.random() * 10) + 's';
        s.style.animationDelay = -(Math.random() * 12) + 's';
        cont.appendChild(s);
    }
})();

// ======================================================
// CONFIG UI
// ======================================================
function showPortada() {
    const name = document.getElementById('cfg-name').value.trim() || 'Jugadora';
    document.getElementById('portada-name').textContent = name;
    showScreen('start-screen');
}

function setTheme(t) {
    config.theme = t;
    const th = THEMES[t];
    document.getElementById('btn-uni').classList.toggle('active',  t === 'unicornio');
    document.getElementById('btn-poke').classList.toggle('active', t === 'pokemon');
    document.body.style.background = th.bg;
    document.getElementById('start-title').innerHTML     = th.title;
    document.getElementById('start-mission').textContent = th.mission;
    const pb = themeIcon(th, '1em');
    document.getElementById('start-emoji').innerHTML = th.iconImg ? `${pb}✨${pb}` : th.startEmoji;
    document.getElementById('start-pokemon-emoji').style.display = t === 'pokemon' ? 'block' : 'none';
}

function changeQ(delta) {
    config.totalQ = Math.max(5, Math.min(30, config.totalQ + delta));
    document.getElementById('cfg-q').textContent = config.totalQ;
}

function changeSecs(delta) {
    config.secsPerQ = Math.max(2, Math.min(10, config.secsPerQ + delta));
    document.getElementById('cfg-secs').textContent = config.secsPerQ;
}

// ======================================================
// QUESTION GENERATION
// ======================================================
function allQuestions() {
    const pool = [];
    const tablas = config.tablas.length > 0 ? config.tablas : [1, 2, 3, 5, 10];
    for (const t of tablas) {
        for (let i = 1; i <= 10; i++) pool.push({ a: t, b: i, ans: t * i });
    }
    return pool;
}

function toggleTabla(n) {
    const idx = config.tablas.indexOf(n);
    if (idx === -1) {
        config.tablas.push(n);
    } else {
        if (config.tablas.length === 1) return; // al menos una tabla siempre activa
        config.tablas.splice(idx, 1);
    }
    const btns = document.querySelectorAll('.tabla-btn');
    btns.forEach(btn => {
        const num = parseInt(btn.textContent);
        btn.classList.toggle('active', config.tablas.includes(num));
    });
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function wrongAnswers(correct) {
    const offsets = shuffle([-6,-5,-4,-3,-2,-1,1,2,3,4,5,6]);
    const result = [];
    for (const off of offsets) {
        if (result.length >= 3) break;
        const v = correct + off;
        if (v > 0) result.push(v);
    }
    return result;
}

// ======================================================
// START GAME
// ======================================================
function startGame() {
    const th = THEMES[config.theme];
    questions = shuffle(allQuestions()).slice(0, config.totalQ);
    currentQ = 0; score = 0; canAnswer = true;

    document.body.style.background = th.bg;
    document.getElementById('theme-icon').innerHTML    = themeIcon(th, '1em');
    document.getElementById('action-word').textContent = th.action;
    document.getElementById('q-total').textContent     = config.totalQ;
    document.getElementById('end-title').textContent   = th.endTitle;
    document.getElementById('replay-btn').textContent  = th.replayBtn;

    // Progress bar
    const bar = document.getElementById('unicorn-bar');
    bar.innerHTML = '';
    for (let i = 0; i < config.totalQ; i++) {
        const d = document.createElement('div');
        d.className = 'uni-icon'; d.id = 'uni-' + i;
        d.innerHTML = themeIcon(th, '1.2em');
        bar.appendChild(d);
    }

    // Cage overlay & character layers
    const isPoke = config.theme === 'pokemon';
    document.getElementById('unicorn-img').style.display  = isPoke ? 'none'  : 'block';
    document.getElementById('pokemon-img').style.display  = isPoke ? 'block' : 'none';
    document.getElementById('cage-svg').style.display     = isPoke ? 'none'  : 'block';
    document.getElementById('pokeball-img').style.display = isPoke ? 'block' : 'none';
    if (!isPoke) document.getElementById('cage-svg').innerHTML = th.cageHTML;

    showScreen('game-screen');
    startGlobalTimer();
    loadQuestion();
}

// ======================================================
// LOAD QUESTION
// ======================================================
function loadQuestion() {
    const q  = questions[currentQ];
    document.getElementById('question-text').textContent = `${q.a} × ${q.b} = ?`;
    document.getElementById('q-num').textContent   = currentQ + 1;
    document.getElementById('score').textContent   = score;
    document.getElementById('feedback').textContent = '';

    if (config.theme === 'unicornio') {
        document.getElementById('unicorn-img').src = UNICORN_IMAGES[currentQ % UNICORN_IMAGES.length];
    } else {
        document.getElementById('pokemon-img').src = POKEMON_IMAGES[currentQ % POKEMON_IMAGES.length];
    }

    document.getElementById(config.theme === 'pokemon' ? 'pokeball-img' : 'cage-svg').style.opacity = '1';

    const options = shuffle([q.ans, ...wrongAnswers(q.ans)]);
    document.querySelectorAll('.btn-answer').forEach((btn, i) => {
        btn.textContent = options[i];
        btn.dataset.val = options[i];
        btn.className   = 'btn-answer';
        btn.disabled    = false;
    });

    canAnswer = true;
}

// ======================================================
// CHECK ANSWER
// ======================================================
function checkAnswer(btn) {
    if (!canAnswer) return;
    canAnswer = false;

    const q    = questions[currentQ];
    const th   = THEMES[config.theme];
    const sel  = parseInt(btn.dataset.val);
    const btns = document.querySelectorAll('.btn-answer');
    btns.forEach(b => b.disabled = true);

    if (sel === q.ans) {
        btn.classList.add('correct');
        score++;
        document.getElementById('feedback').textContent = th.cheers[currentQ % th.cheers.length];
        document.getElementById('feedback').style.color = '#2e7d32';
        document.getElementById(config.theme === 'pokemon' ? 'pokeball-img' : 'cage-svg').style.opacity = '0';
        playMagicSound();
        setTimeout(() => {
            document.getElementById('uni-' + currentQ).classList.add('rescued');
            spawnSparkles();
        }, 150);
        setTimeout(advance, 1400);
    } else {
        btn.classList.add('wrong');
        btns.forEach(b => { if (parseInt(b.dataset.val) === q.ans) b.classList.add('correct'); });
        document.getElementById('feedback').textContent = th.wrongMsg(q.ans);
        document.getElementById('feedback').style.color = '#7e22ce';
        playErrorSound();
        setTimeout(advance, 1400);
    }
}

// ======================================================
// ADVANCE
// ======================================================
function advance() {
    currentQ++;
    if (currentQ >= config.totalQ) endGame();
    else loadQuestion();
}

// ======================================================
// END GAME
// ======================================================
function endGame() {
    stopGlobalTimer();
    const th   = THEMES[config.theme];
    const name = document.getElementById('cfg-name').value.trim() || 'Jugadora';
    const pct  = score / config.totalQ;

    const ico = themeIcon(th, '1.6em');
    document.getElementById('final-icons').innerHTML  = score > 0 ? ico.repeat(score) : '😢';
    document.getElementById('final-score').innerHTML  = `${name}: ${score} de ${config.totalQ} ${themeIcon(th, '1em')}`;

    let msg;
    if (pct === 1)       msg = '¡¡PERFECTO!! ¡Eres la mejor del universo! 👑🌟';
    else if (pct >= 0.8) msg = '¡Qué bien lo has hecho! ¡Casi perfecta! 💫';
    else if (pct >= 0.6) msg = '¡Muy bien! Con un poco más, ¡lo consigues! 🌈';
    else if (pct >= 0.4) msg = '¡Sigue practicando! ¡Tú puedes! 💜';
    else                 msg = '¡Ánimo! Cada intento te hace más fuerte. 🌈';
    document.getElementById('final-msg').textContent = msg;

    showScreen('end-screen');
    for (let i = 0; i < 6; i++) setTimeout(spawnSparkles, i * 280);
}

// ======================================================
// GLOBAL TIMER
// ======================================================
function startGlobalTimer() {
    clearInterval(globalTimerInterval);
    globalTimeLeft = config.totalQ * config.secsPerQ * 1000;
    updateTimerDisplay();
    globalTimerInterval = setInterval(() => {
        globalTimeLeft -= 100;
        if (globalTimeLeft <= 0) {
            globalTimeLeft = 0;
            updateTimerDisplay();
            clearInterval(globalTimerInterval);
            globalTimeOut();
        } else {
            updateTimerDisplay();
        }
    }, 100);
}

function stopGlobalTimer() { clearInterval(globalTimerInterval); }

function updateTimerDisplay() {
    const total = config.totalQ * config.secsPerQ * 1000;
    document.getElementById('timer-secs').textContent = Math.ceil(globalTimeLeft / 1000);
    const pct = (globalTimeLeft / total) * 100;
    const bar = document.getElementById('timer-bar');
    bar.style.width = pct + '%';
    if (pct > 50)      bar.style.background = 'linear-gradient(90deg, #a855f7, #ff69b4)';
    else if (pct > 20) bar.style.background = 'linear-gradient(90deg, #fb923c, #fbbf24)';
    else               bar.style.background = 'linear-gradient(90deg, #f44336, #ff6b35)';
}

function globalTimeOut() {
    canAnswer = false;
    document.querySelectorAll('.btn-answer').forEach(b => b.disabled = true);
    document.getElementById('feedback').textContent = THEMES[config.theme].timeMsg;
    document.getElementById('feedback').style.color = '#c62828';
    playErrorSound();
    setTimeout(endGame, 1200);
}

// ======================================================
// SOUNDS
// ======================================================
function playMagicSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 784, 1047, 1319].forEach((freq, i) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
            gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + i * 0.1 + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.55);
            osc.start(ctx.currentTime + i * 0.1);
            osc.stop(ctx.currentTime + i * 0.1 + 0.6);
        });
        const sh = ctx.createOscillator(), sg = ctx.createGain();
        sh.connect(sg); sg.connect(ctx.destination);
        sh.type = 'sine'; sh.frequency.setValueAtTime(2093, ctx.currentTime + 0.35);
        sg.gain.setValueAtTime(0.18, ctx.currentTime + 0.35);
        sg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.1);
        sh.start(ctx.currentTime + 0.35); sh.stop(ctx.currentTime + 1.2);
    } catch(e) {}
}

function playErrorSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [330, 262].forEach((freq, i) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.18);
            gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.18);
            gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.18 + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.45);
            osc.start(ctx.currentTime + i * 0.18);
            osc.stop(ctx.currentTime + i * 0.18 + 0.5);
        });
    } catch(e) {}
}

// ======================================================
// SPARKLES
// ======================================================
function spawnSparkles() {
    const wrap = document.createElement('div');
    wrap.className = 'sparkle-wrap';
    wrap.style.left = (30 + Math.random() * 40) + 'vw';
    wrap.style.top  = (25 + Math.random() * 40) + 'vh';
    document.body.appendChild(wrap);
    const items = ['✨','⭐','🌟','💫','🦄','💜','💖','🌈'];
    for (let i = 0; i < 14; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = items[Math.floor(Math.random() * items.length)];
        const angle = (i / 14) * 360, dist = 70 + Math.random() * 90;
        s.style.fontSize = (0.9 + Math.random() * 0.8) + 'em';
        s.style.setProperty('--tx', Math.cos(angle * Math.PI / 180) * dist + 'px');
        s.style.setProperty('--ty', Math.sin(angle * Math.PI / 180) * dist + 'px');
        wrap.appendChild(s);
    }
    setTimeout(() => wrap.remove(), 1000);
}

// ======================================================
// UTILS
// ======================================================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
